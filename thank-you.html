<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Obrigado | BamBlue</title>
  <link rel="icon" href="assets/images/logo-bamblue.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --c-primary: #001AB3;
      --c-accent: #204ce5;
      --c-navy: #112337;
      --c-bg-deep: #0a1530;
      --c-blue-soft: #527EFF;
      --c-success: #00875a;
      --font-sans: 'Sora', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: var(--font-sans);
      background: radial-gradient(120% 120% at 50% 0%, #16264a 0%, var(--c-bg-deep) 55%, #050b1c 100%);
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      -webkit-font-smoothing: antialiased;
    }
    .card {
      width: 100%;
      max-width: 560px;
      text-align: center;
    }
    .logo { height: 34px; margin-bottom: 40px; }
    .check {
      width: 84px; height: 84px;
      margin: 0 auto 28px;
      border-radius: 50%;
      background: rgba(0, 135, 90, 0.15);
      border: 1.5px solid rgba(0, 135, 90, 0.5);
      display: flex; align-items: center; justify-content: center;
      animation: pop .5s cubic-bezier(.2,.9,.3,1.4) both;
    }
    @keyframes pop { from { transform: scale(.4); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .check svg { width: 40px; height: 40px; stroke: #3ddc97; }
    h1 { font-size: clamp(1.7rem, 4vw, 2.4rem); font-weight: 700; letter-spacing: -0.02em; margin-bottom: 16px; }
    p { font-size: 1.05rem; line-height: 1.6; color: #c2cbe0; margin-bottom: 12px; }
    p strong { color: #fff; font-weight: 600; }
    .meta { font-size: .92rem; color: #8a95b0; margin-top: 8px; }
    .actions { margin-top: 36px; display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; }
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 14px 26px; border-radius: 10px;
      font-family: inherit; font-size: 1rem; font-weight: 600;
      text-decoration: none; cursor: pointer; transition: transform .15s ease, opacity .15s ease;
    }
    .btn:hover { transform: translateY(-2px); }
    .btn--primary { background: var(--c-accent); color: #fff; box-shadow: 0 10px 30px rgba(32,76,229,.35); }
    .btn--ghost { background: transparent; color: #c2cbe0; border: 1px solid rgba(255,255,255,.18); }
    .footer { margin-top: 48px; font-size: .82rem; color: #6b7593; }
    .footer a { color: #8fa2d8; text-decoration: none; }
  </style>
</head>
<body>
  <main class="card">
    <img src="assets/images/logo-footer.svg" alt="BamBlue — shaping life." class="logo" />

    <div class="check" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
    </div>

    <h1>Pedido recebido. Obrigado!</h1>
    <p>Recebemos o seu pedido de <strong>diagnóstico técnico gratuito</strong>.</p>
    <p class="meta">A nossa equipa entra em contacto consigo nas próximas <strong>24 horas úteis</strong> para agendar a avaliação.</p>

    <div class="actions">
      <a href="/" class="btn btn--primary">Voltar ao site</a>
      <a href="tel:+351234099178" class="btn btn--ghost">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.86 19.86 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.86 19.86 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
        Falar com a equipa
      </a>
    </div>

    <div class="footer">
      BamBlue · Automação &amp; Robótica Industrial · <a href="https://bamblue.pt" target="_blank" rel="noopener">bamblue.pt</a>
    </div>
  </main>
</body>
</html>
